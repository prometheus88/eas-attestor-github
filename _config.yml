# Jekyll configuration for EAS Attestor
# This file enables Jekyll variable processing in our GitHub Actions workflow

# Site settings
title: EAS Attestor for Github
description: A stateless system for creating cryptographic attestations linking GitHub usernames to Ethereum addresses using EAS
url: "https://prometheus88.github.io"
baseurl: "/eas-attestor-github-private"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .git
  - .github
  - scripts
  - taskfiles
  - foundry.toml
  - jest.config.cjs
  - tsconfig.json
  - package.json
  - package-lock.json
  - .env.example
  - .eslintrc.js
  - .gitattributes
  - .gitignore
  - .gitmodules
  - .prettierrc
  - README.md
  - Taskfile.yml
  - DEPLOYMENT.md
  - deploy
  - lib
  - third_party
  - src/main/solidity
  - src/main/typescript
  - src/test

# Include only HTML files for processing
include:
  - src/main/html 