name: Publish Static Site

on:
  push:
    branches: [ main ]
    paths:
      - 'src/main/html/**'
      - 'src/main/typescript/validator/**'
      - '.github/workflows/publish.yml'
      - 'taskfiles/App.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup dependencies
        run: |
          forge install
          npm install

      - name: Build site for production
        run: |
          # Generate production config with environment variables
          echo "window.ENV_CONFIG = { validatorUrl: '${{ secrets.VALIDATOR_URL || 'https://validator.eas-attestor.com' }}' };" > src/main/html/config.js
          task app:build:dist:prod
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html/dist
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4