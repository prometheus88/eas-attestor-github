name: Publish Static Site

on:
  push:
    branches: [ main ]
    paths:
      - 'src/main/html/**'
      - 'src/main/typescript/validator/**'
      - '.github/workflows/publish.yml'
      - 'taskfiles/App.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup dependencies
        run: |
          forge install
          npm install

      - name: Build site for production
        env:
          VALIDATOR_URL: ${{ secrets.VALIDATOR_URL || 'https://dev.thewarp.ai/validator' }}
        run: |
          echo "🔗 Building with validator URL: $VALIDATOR_URL"
          echo "🔍 Using fallback URL: https://dev.thewarp.ai/validator"
          echo "💡 To use a custom URL, set VALIDATOR_URL secret in repository settings"
          
          # Use the sophisticated build system that properly processes templates
          task app:build:dist:prod:custom
          
          # Process Jekyll variables in the built HTML files
          echo "Processing Jekyll variables..."
          cd build/html/dist
          
          # Replace Jekyll variables with actual values from GitHub context
          find . -name "*.html" -exec sed -i 's|{{site.github.repository_url}}|https://github.com/${{ github.repository }}|g' {} \;
          find . -name "*.html" -exec sed -i 's|{{site.github.owner_name}}|${{ github.repository_owner }}|g' {} \;
          find . -name "*.html" -exec sed -i 's|{{site.github.repository_name}}|${{ github.event.repository.name }}|g' {} \;
          
          echo "Jekyll variables processed successfully"
          
          # Verify the configuration was generated correctly
          echo "🔍 Verifying production configuration..."
          if grep -q "{{VALIDATOR_URL}}" config.js; then
            echo "❌ ERROR: Template variables not replaced in config.js"
            cat config.js
            exit 1
          else
            echo "✅ Configuration generated successfully"
            echo "📋 Final config.js contents:"
            cat config.js
          fi
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html/dist
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4